<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
  </head>
  <body>
    <script>
      // Redirect all 404 errors back to index.html with the correct base path
      const base = '/INSTAGRAM-CLONE';
      const path = window.location.pathname;
      if (!path.startsWith(base)) {
        window.location.replace(base + path + window.location.search + window.location.hash);
      } else {
        window.location.replace(base + '/index.html' + window.location.search + window.location.hash);
      }
    </script>
  </body>
</html>
